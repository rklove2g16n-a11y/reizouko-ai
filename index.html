<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>冷蔵庫AI</title><style>
body{font-family:system-ui;margin:0;background:#f7f6ef;color:#222}header{padding:18px;background:linear-gradient(135deg,#fff1bd,#ddf2dd)}main{padding:14px;max-width:850px;margin:auto}.card{background:white;border-radius:16px;padding:14px;margin:0 0 14px;box-shadow:0 5px 14px #0001}input,select,button{width:100%;box-sizing:border-box;border-radius:12px;padding:12px;font-size:16px;margin-top:8px}input,select{border:1px solid #ddd;background:white}button{border:0;background:#222;color:white;font-weight:800}.b2{background:#4b8f5a}.b3{background:#b4602b}.gray{background:#777}.row{display:grid;grid-template-columns:1fr 110px;gap:8px}.row3{display:grid;grid-template-columns:1fr 80px 100px;gap:8px}.chip{display:inline-block;width:auto;margin:5px;padding:8px 11px;border-radius:999px;background:#eef3ea;color:#222;font-size:14px}.on{background:#4b8f5a;color:white}.notice{background:#eef3ea;border-radius:12px;padding:10px;margin:10px 0;line-height:1.5}.recipe{border:1px solid #eee;border-radius:14px;padding:12px;margin-top:12px}.tag{display:inline-block;background:#eef3ea;border-radius:999px;padding:4px 8px;font-size:12px;margin:2px}.orange{background:#ffe3d0;color:#9a3f13}.item{border-bottom:1px solid #eee;padding:9px 0}.top{display:flex;justify-content:space-between;gap:8px}.mini{width:auto;margin:0;padding:7px 9px;background:#ddd;color:#222;font-size:13px}.small{font-size:13px;color:#666}ul,ol{padding-left:22px}</style></head><body><header><h1>冷蔵庫AI</h1><div>主役食材から、美味しさ・相性・満腹量で献立10候補</div></header><main>
<div class="card"><b>今日の夕飯</b><div class="row"><select id="people"><option value="1">1人</option><option value="2" selected>2人</option><option value="3">3人</option><option value="4">4人</option></select><select id="carbMode"><option value="auto">主食おまかせ</option><option value="rice">米</option><option value="pasta">パスタ</option><option value="udon">うどん</option><option value="soba">そば</option><option value="somen">そうめん</option><option value="none">おかずだけ</option></select></div><div class="notice">使いたい材料と量を入れる。AIが在庫にある食材だけ追加して、ワンパターンじゃない献立10個を出す。</div><div id="baseRows"></div><button class="b2" onclick="addBaseRow()">使いたい材料を追加</button><button class="b3" onclick="makeMenus()">この材料で10候補出す</button><div id="menuResult" class="small">例：ソーセージ10本、もやし6袋</div></div>
<div class="card"><b>満腹量設定</b><div class="row"><input id="rice2" type="number" value="4" step="0.5"><input id="pasta2" type="number" value="600" step="50"></div><div class="small">左：米2人分の合数 / 右：パスタ2人分のg</div><div class="row"><input id="somen2" type="number" value="6"><input id="udon2" type="number" value="4"></div><button class="b2" onclick="saveSettings()">保存</button></div>
<div class="card"><b>在庫追加</b><div id="foodChips"></div><input id="foodName" placeholder="例：もやし、ソーセージ、パスタ"><div class="row3"><input id="foodQty" placeholder="数量"><select id="foodUnit"><option>個</option><option>本</option><option>袋</option><option>切れ</option><option>g</option><option>kg</option><option>合</option><option>束</option><option>玉</option><option>缶</option><option>丁</option><option>株</option><option>パック</option></select><input id="foodLimit" type="date"></div><input id="unitGram" placeholder="1単位の重さg 例：もやし1袋200gなら200"><button class="b2" onclick="addFood()">在庫に追加</button><button class="gray" onclick="restoreOld()">前の在庫を復活</button><div id="stockList"></div></div>
<div class="card"><b>調味料</b><div id="seasoningChips"></div><input id="newSeasoning" placeholder="例：ラー油、豆板醤、ポン酢"><button class="b2" onclick="addSeasoning()">調味料を追加</button></div>
<div class="card"><b>買い物メモ</b><input id="memoInput" placeholder="例：玉ねぎ"><button class="b2" onclick="addMemo()">追加</button><ul id="memoList"></ul></div>
</main><script>
const foodMaster=['米','パスタ','そうめん','うどん','そば','焼きそば麺','ソーセージ','卵','鮭','鶏肉','豚肉','牛肉','ひき肉','ツナ缶','豆腐','納豆','もやし','えのき','ブロッコリー','ほうれん草','ニラ','長ネギ','ピーマン','玉ねぎ','じゃがいも','にんじん','きゅうり','キャベツ'];
const defaultSeasons=['醤油','白だし','みりん','砂糖','酒','鶏ガラ','味の素','ごま油','マヨネーズ','ポッカレモン','オイスターソース','にんにく','しょうが','味噌','バター','カレールー','ナンプラー','豆板醤','ケチャップ','ソース','めんつゆ','塩こしょう','ポン酢'];
const STORE='reizoukoAI_v1';let D=JSON.parse(localStorage.getItem(STORE)||'{}'),stock=D.stock||[],seasons=D.seasons||defaultSeasons.slice(0,16),allSeasons=D.allSeasons||defaultSeasons,memo=D.memo||[],settings=D.settings||{rice2:4,pasta2:600,somen2:6,udon2:4},baseCount=0,editIndex=null,currentMenus=[];
function $(id){return document.getElementById(id)}function num(v){let x=parseFloat(String(v).replace(/[^\d.]/g,''));return isNaN(x)?0:x}function round(x){return Math.round(x*10)/10}function save(){localStorage.setItem(STORE,JSON.stringify({stock,seasons,allSeasons,memo,settings}));['phoneStock','v41stock','v4stock','v3stock','stockV2'].forEach(k=>localStorage.setItem(k,JSON.stringify(stock)))}function saveSettings(){settings={rice2:+$('rice2').value,pasta2:+$('pasta2').value,somen2:+$('somen2').value,udon2:+$('udon2').value};save();alert('保存しました')}function loadSettings(){$('rice2').value=settings.rice2;$('pasta2').value=settings.pasta2;$('somen2').value=settings.somen2;$('udon2').value=settings.udon2}
function hasSeason(x){return seasons.includes(x)}function stockItem(name){return stock.find(s=>name.includes(s.name)||s.name.includes(name))}function hasStock(name){return !!stockItem(name)}function stockNames(){return stock.map(s=>s.name).filter(Boolean)}function unitOf(f){if(f==='米')return'合';if(f==='パスタ')return'g';if(f==='そうめん')return'束';if(['うどん','そば','焼きそば麺'].includes(f))return'玉';if(['ソーセージ','きゅうり'].includes(f))return'本';if(['もやし','えのき','ほうれん草'].includes(f))return'袋';if(f==='豆腐')return'丁';if(f==='ブロッコリー')return'株';if(f==='鮭')return'切れ';if(f==='ツナ缶')return'缶';if(f==='納豆')return'パック';return'個'}function defaultAmount(f){if(f==='ソーセージ')return 4;if(f==='卵')return 2;if(f==='鮭')return 2;if(f==='ツナ缶')return 1;if(['鶏肉','豚肉','牛肉','ひき肉'].includes(f))return 250;if(f==='ピーマン')return 2;return 1}function useObj(f){let s=stockItem(f);return{name:f,amount:defaultAmount(f),unit:s?s.unit:unitOf(f)}}
function carb(type){let rate=+$('people').value/2;if(type==='rice'&&hasStock('米'))return{name:'米',amount:+$('rice2').value*rate,unit:'合'};if(type==='pasta'&&hasStock('パスタ'))return{name:'パスタ',amount:+$('pasta2').value*rate,unit:'g'};if(type==='udon'&&hasStock('うどん'))return{name:'うどん',amount:+$('udon2').value*rate,unit:'玉'};if(type==='soba'&&hasStock('そば'))return{name:'そば',amount:+$('udon2').value*rate,unit:'玉'};if(type==='somen'&&hasStock('そうめん'))return{name:'そうめん',amount:+$('somen2').value*rate,unit:'束'};if(type==='yakisoba'&&hasStock('焼きそば麺'))return{name:'焼きそば麺',amount:+$('udon2').value*rate,unit:'玉'};return null}function bestCarbs(){let m=$('carbMode').value;if(m==='none')return[null];if(m!=='auto')return[carb(m)].filter(Boolean);let a=[];['rice','pasta','udon','yakisoba','soba','somen'].forEach(t=>{let c=carb(t);if(c)a.push(c)});a.push(null);return a}
function addBaseRow(name='',qty='',unit=''){let id=baseCount++,div=document.createElement('div');div.className='row3';div.style.marginTop='8px';div.id='baseRow'+id;let opts=['個','本','袋','切れ','g','kg','合','束','玉','缶','丁','株','パック'].map(u=>`<option ${u===unit?'selected':''}>${u}</option>`).join('');div.innerHTML=`<input id="bn${id}" placeholder="食材" value="${name}"><input id="bq${id}" placeholder="量" value="${qty}"><select id="bu${id}">${opts}</select><button class="gray" onclick="$('baseRow${id}').remove()">削除</button>`;$('baseRows').appendChild(div)}function baseUses(){let a=[];for(let i=0;i<baseCount;i++){let n=$('bn'+i),q=$('bq'+i),u=$('bu'+i);if(n&&q&&u&&n.value.trim()&&q.value.trim())a.push({name:n.value.trim(),amount:num(q.value),unit:u.value})}return a}
const pair={ソーセージ:['ピーマン','玉ねぎ','卵','えのき','もやし','ニラ','ブロッコリー','キャベツ'],もやし:['ソーセージ','豚肉','卵','ニラ','えのき','豆腐'],えのき:['ソーセージ','鮭','卵','豚肉','豆腐','ほうれん草'],卵:['ソーセージ','もやし','えのき','納豆','ツナ缶','ニラ','ピーマン'],ツナ缶:['きゅうり','卵','米','パスタ'],納豆:['卵','米','長ネギ','豆腐'],鮭:['えのき','ブロッコリー','ほうれん草','米','パスタ'],ピーマン:['ソーセージ','ひき肉','玉ねぎ','卵'],ブロッコリー:['ソーセージ','卵','ツナ缶','鮭']};
const styles=[{name:'王道ナポリタン',type:['pasta'],need:['ケチャップ'],season:['ケチャップ 大さじ5','あればバター 10g'],good:['ソーセージ','ピーマン','玉ねぎ','卵'],bad:['もやし','納豆','きゅうり'],step:'ケチャップを炒めて水分を飛ばし、具材とパスタに絡める。'},{name:'スタミナチャーハン',type:['rice'],need:['鶏ガラ','醤油'],season:['鶏ガラ 小さじ2','醤油 小さじ1'],good:['ソーセージ','もやし','ニラ','卵','豚肉'],bad:['きゅうり'],step:'具材と米を強火で炒め、鶏ガラと醤油で仕上げる。'},{name:'和風バター醤油',type:['rice','pasta','side'],need:['バター','醤油'],season:['バター 15g','醤油 大さじ1'],good:['ソーセージ','えのき','鮭','ほうれん草','ブロッコリー','卵'],bad:['納豆','きゅうり'],step:'バターと醤油を絡めて香ばしく仕上げる。'},{name:'マヨ醤油炒め',type:['rice','side'],need:['マヨネーズ','醤油'],season:['マヨネーズ 大さじ1','醤油 小さじ1'],good:['ソーセージ','ブロッコリー','卵','ツナ缶'],bad:['納豆'],step:'マヨネーズで炒め、仕上げに醤油を入れる。'},{name:'中華炒め',type:['rice','udon','side'],need:['鶏ガラ','醤油'],season:['鶏ガラ 小さじ1','醤油 小さじ1'],good:['もやし','ニラ','卵','豚肉','ソーセージ','えのき'],bad:['きゅうり'],step:'鶏ガラと醤油で中華風にまとめる。'},{name:'にんにく醤油',type:['rice','pasta','udon','side'],need:['醤油','にんにく'],season:['醤油 大さじ1','にんにく 少し'],good:['ソーセージ','豚肉','鶏肉','もやし','ピーマン'],bad:['納豆'],step:'にんにくを効かせて醤油で味付けする。'},{name:'白だし卵とじ',type:['rice','side'],need:['白だし','醤油'],season:['白だし 大さじ1','醤油 小さじ1'],good:['えのき','卵','豆腐','鮭','もやし'],bad:['きゅうり'],step:'白だしで煮て卵でとじる。'},{name:'オイスター中華',type:['rice','udon','side'],need:['オイスターソース','醤油'],season:['オイスターソース 小さじ2','醤油 小さじ1'],good:['豚肉','牛肉','ひき肉','ピーマン','もやし','ニラ'],bad:['納豆','きゅうり'],step:'オイスターソースでコクを出す。'},{name:'ソース焼きそば風',type:['yakisoba'],need:['ソース'],season:['ソース 大さじ3'],good:['ソーセージ','キャベツ','卵','もやし','ピーマン'],bad:['納豆','きゅうり'],step:'ソースで香ばしく炒める。'},{name:'めんつゆ和え',type:['soba','somen','udon','side'],need:['めんつゆ'],season:['めんつゆ 大さじ2'],good:['卵','えのき','豆腐','長ネギ','ツナ缶'],bad:['ソーセージ'],step:'めんつゆで和風に味を決める。'}];
function okStyle(s){return s.need.every(x=>hasSeason(x)||x.startsWith('あれば'))}function scoreMenu(base,extra,style,carbObj,side){let items=[...base,...extra].map(x=>x.name),sc=0;items.forEach(n=>{if(style.good.includes(n))sc+=30;if(style.bad.includes(n))sc-=80});for(let i=0;i<items.length;i++)for(let j=i+1;j<items.length;j++)sc+=((pair[items[i]]||[]).includes(items[j])||(pair[items[j]]||[]).includes(items[i]))?45:0;if(carbObj)sc+=70;if(side)sc+=35;if(items.length>=3)sc+=15;if(items.includes('もやし')&&style.name.includes('ナポリタン'))sc-=250;if(items.includes('納豆')&&carbObj&&carbObj.name!=='米')sc-=250;return sc}
function sideOptions(baseNames){let a=[];if(hasStock('もやし')&&!baseNames.includes('もやし')&&['鶏ガラ','ごま油','醤油'].every(hasSeason))a.push({name:'もやしナムル',items:[useObj('もやし')],season:['鶏ガラ 小さじ1','ごま油 小さじ1','醤油 小さじ1'],step:'もやしを加熱して水気を切り、調味料で和える。'});if(hasStock('ツナ缶')&&!baseNames.includes('ツナ缶')&&['マヨネーズ','醤油'].every(hasSeason))a.push({name:'ツナマヨ小鉢',items:[useObj('ツナ缶')],season:['マヨネーズ 大さじ1','醤油 小さじ1'],step:'ツナをマヨ醤油で和える。'});if(hasStock('えのき')&&!baseNames.includes('えのき')&&['バター','醤油'].every(hasSeason))a.push({name:'えのきバター醤油',items:[useObj('えのき')],season:['バター 10g','醤油 小さじ1'],step:'えのきを炒めてバター醤油で味付けする。'});if(hasStock('納豆')&&!baseNames.includes('納豆')&&hasStock('米')&&hasSeason('醤油'))a.push({name:'納豆小鉢',items:[useObj('納豆')],season:['醤油 小さじ1'],step:'納豆に醤油を混ぜる。'});return a}
function titleFor(style,items,carb,side){let n=items.map(x=>x.name);if(style.name==='王道ナポリタン')return `${n.join('・')}の王道ナポリタン`;if(style.name==='スタミナチャーハン')return `${n.join('・')}のスタミナチャーハン`;if(style.name==='白だし卵とじ')return `${n.join('・')}の卵とじ丼`;if(style.name==='ソース焼きそば風')return `${n.join('・')}のソース焼きそば風`;if(carb&&carb.name==='米')return `${n.join('・')}の${style.name}定食`;if(carb&&carb.name==='パスタ')return `${n.join('・')}の${style.name}パスタ`;if(carb)return `${n.join('・')}の${style.name}${carb.name}`;return `${n.join('・')}の${style.name}`}
function makeMenus(){let base=baseUses();if(!base.length){$('menuResult').innerHTML='使いたい材料を入れてください。';return}let missing=base.filter(x=>!hasStock(x.name));if(missing.length){$('menuResult').innerHTML='在庫にない食材があります：'+missing.map(x=>x.name).join('・');return}let baseNames=base.map(x=>x.name),extras=stockNames().filter(x=>!baseNames.some(b=>x.includes(b)||b.includes(x))&&!['米','パスタ','うどん','そば','そうめん','焼きそば麺'].includes(x)).map(useObj);let extraSets=[[]];extras.forEach(x=>extraSets.push([x]));for(let i=0;i<extras.length;i++)for(let j=i+1;j<extras.length;j++)extraSets.push([extras[i],extras[j]]);let sides=sideOptions(baseNames),carbs=bestCarbs(),out=[];extraSets.forEach(ex=>carbs.forEach(c=>styles.filter(okStyle).forEach(st=>{let type=c?({米:'rice',パスタ:'pasta',うどん:'udon',そば:'soba',そうめん:'somen',焼きそば麺:'yakisoba'}[c.name]||'rice'):'side';if(!st.type.includes(type))return;let sidePick=sides.length&&out.length%3===0?sides[out.length%sides.length]:null,sc=scoreMenu(base,ex,st,c,sidePick);if(sc<40)return;let items=[...base,...ex];out.push({title:titleFor(st,items,c,sidePick)+(sidePick?'＋'+sidePick.name:''),base,extra:ex,carb:c,style:st,side:sidePick,score:sc})})));out.sort((a,b)=>b.score-a.score);let varied=[],usedKind=new Set(),usedExtra=new Set();for(let m of out){let kind=(m.carb?m.carb.name:'おかず')+'_'+m.style.name,ex=m.extra.map(x=>x.name).join('_')+'_'+m.style.name;if(usedKind.has(kind)&&varied.length<6)continue;if(usedExtra.has(ex)&&varied.length<8)continue;varied.push(m);usedKind.add(kind);usedExtra.add(ex);if(varied.length>=10)break}currentMenus=varied.length?varied:out.slice(0,10);$('menuResult').innerHTML='<div class="notice">美味しい組み合わせ・満腹量・在庫だけで10候補出しました。</div>'+currentMenus.map(renderMenu).join('')}
function renderMenu(m,i){let mats=[...(m.carb?[m.carb]:[]),...m.base,...m.extra,...(m.side?m.side.items:[])];return `<div class="recipe"><h3>${i+1}. ${m.title}</h3><div><span class="tag">在庫だけ</span><span class="tag">相性重視</span><span class="tag orange">点数 ${Math.round(m.score)}</span></div><p><b>材料</b></p><ul>${mats.map(x=>`<li>${x.name} ${round(x.amount)}${x.unit}</li>`).join('')}</ul><p><b>調味料</b></p><ul>${m.style.season.map(s=>`<li>${s}</li>`).join('')}${m.side?m.side.season.map(s=>`<li>${m.side.name}：${s}</li>`).join(''):''}</ul><p><b>作り方</b></p><ol>${steps(m).map(s=>`<li>${s}</li>`).join('')}</ol><button class="b2" onclick="adjust(${i})">量を変えて再計算</button><div id="adj${i}"></div></div>`}
function steps(m){let s=[];if(m.carb&&m.carb.name==='パスタ')s.push(`パスタ${round(m.carb.amount)}${m.carb.unit}を茹でる。`);if(m.carb&&['うどん','そば','そうめん','焼きそば麺'].includes(m.carb.name))s.push(`${m.carb.name}${round(m.carb.amount)}${m.carb.unit}を用意する。`);if(m.carb&&m.carb.name==='米')s.push(`米${round(m.carb.amount)}${m.carb.unit}を用意する。`);s.push([...m.base,...m.extra].map(x=>x.name).join('・')+'を食べやすく切る。');s.push('火が通りにくいものから炒める。');if(m.carb&&m.carb.name!=='米')s.push(`${m.carb.name}を加えて合わせる。`);s.push(m.style.step);if(m.carb&&m.carb.name==='米')s.push('ご飯にのせる、または炒め合わせる。');if(m.side)s.push('追加の1品：'+m.side.step);return s}
function adjust(i){let m=currentMenus[i],mats=[...(m.carb?[m.carb]:[]),...m.base,...m.extra,...(m.side?m.side.items:[])],h='<div class="editBox"><b>量を変更</b>';mats.forEach((x,j)=>h+=`<label>${x.name}（${x.unit}）</label><input id="ad${i}_${j}" value="${round(x.amount)}">`);h+=`<button class="b2" onclick="recalc(${i})">再計算</button><div id="re${i}"></div></div>`;$('adj'+i).innerHTML=h}function recalc(i){let m=currentMenus[i],mats=[...(m.carb?[m.carb]:[]),...m.base,...m.extra,...(m.side?m.side.items:[])],rate=1,html='';mats.forEach((x,j)=>{let v=num($('ad'+i+'_'+j).value);if(x.amount>0)rate=Math.max(rate,v/x.amount);html+=`<li>${x.name} ${v}${x.unit}</li>`});let seas=m.style.season.map(s=>s.replace(/(\d+(\.\d+)?)/g,a=>round(parseFloat(a)*rate)));$('re'+i).innerHTML=`<div class="notice">調味料を約${round(rate)}倍にしました。</div><ul>${html}</ul><p><b>調味料</b></p><ul>${seas.map(s=>`<li>${s}</li>`).join('')}</ul>`}
function renderFoodChips(){$('foodChips').innerHTML=foodMaster.map(f=>`<button class="chip" onclick="quickFood('${f}')">${f}</button>`).join('')}function quickFood(f){stock.push({name:f,qty:'1',unit:unitOf(f),unitGram:'',limit:$('foodLimit').value});save();renderStock()}function addFood(){let arr=$('foodName').value.trim().replace(/[、，,\s]/g,' ').split(' ').filter(Boolean);arr.forEach(name=>stock.push({name,qty:$('foodQty').value||'1',unit:$('foodUnit').value,unitGram:$('unitGram').value||'',limit:$('foodLimit').value}));$('foodName').value='';$('foodQty').value='';$('unitGram').value='';$('foodLimit').value='';save();renderStock()}function displayStock(s){let extra=s.unitGram?`（1${s.unit}${s.unitGram}g / 合計${round(num(s.qty)*num(s.unitGram))}g）`:'';return `${s.name} / ${s.qty}${s.unit}${extra}`}function renderStock(){if(!stock.length){$('stockList').innerHTML='在庫はまだありません。';return}$('stockList').innerHTML=stock.map((s,i)=>({...s,i})).map(s=>`<div class="item"><div class="top"><div><div><b>${displayStock(s)}</b></div></div><div><button class="mini" onclick="editIndex=${s.i};renderStock()">編集</button><button class="mini" onclick="stock.splice(${s.i},1);save();renderStock()">削除</button></div></div>${editIndex===s.i?editHtml(s):''}</div>`).join('')}function editHtml(s){return`<div class="editBox"><input id="en${s.i}" value="${s.name}"><div class="row3"><input id="eq${s.i}" value="${s.qty}"><select id="eu${s.i}">${['個','本','袋','切れ','g','kg','合','束','玉','缶','丁','株','パック'].map(u=>`<option ${u===s.unit?'selected':''}>${u}</option>`).join('')}</select><input id="eg${s.i}" value="${s.unitGram||''}" placeholder="1単位g"></div><button class="b2" onclick="saveEdit(${s.i})">保存</button><button class="gray" onclick="editIndex=null;renderStock()">キャンセル</button></div>`}function saveEdit(i){stock[i]={...stock[i],name:$('en'+i).value,qty:$('eq'+i).value,unit:$('eu'+i).value,unitGram:$('eg'+i).value};editIndex=null;save();renderStock()}
function renderSeasons(){$('seasoningChips').innerHTML=allSeasons.map(s=>`<button class="chip ${hasSeason(s)?'on':''}" onclick="toggleSeason('${s}')">${hasSeason(s)?'✓ ':''}${s}</button>`).join('')}function toggleSeason(s){seasons=hasSeason(s)?seasons.filter(x=>x!==s):[...seasons,s];save();renderSeasons()}function addSeasoning(){let arr=$('newSeasoning').value.trim().replace(/[、，,\s]/g,' ').split(' ').filter(Boolean);arr.forEach(s=>{if(!allSeasons.includes(s))allSeasons.push(s);if(!seasons.includes(s))seasons.push(s)});$('newSeasoning').value='';save();renderSeasons()}function addMemo(){let v=$('memoInput').value.trim();if(!v)return;memo.push(v);$('memoInput').value='';save();renderMemo()}function renderMemo(){$('memoList').innerHTML=memo.map((m,i)=>`<li onclick="memo.splice(${i},1);save();renderMemo()">${m}</li>`).join('')}function restoreOld(){let added=0;['phoneStock','v41stock','v4stock','v3stock','stockV2'].forEach(k=>{try{let a=JSON.parse(localStorage.getItem(k)||'[]');if(Array.isArray(a))a.forEach(x=>{if(x.name&&!stock.some(s=>s.name===x.name&&s.qty===x.qty)){stock.push(x);added++}})}catch(e){}});save();renderStock();alert(added?`復活 ${added}件`:'前の在庫が見つかりません')}function init(){loadSettings();renderFoodChips();renderStock();renderSeasons();renderMemo();addBaseRow()}init();
</script></body></html>
