</style></head><body><header><h1>冷蔵庫AI</h1><div>主役食材から、美味しさ・相性・満腹量で献立候補を出す</div></header><main>
<div class="card"><b>今日の夕飯</b><div class="row"><select id="people"><option value="1">1人</option><option value="2" selected>2人</option><option value="3">3人</option><option value="4">4人</option></select><select id="carbMode"><option value="auto">主食おまかせ</option><option value="rice">米</option><option value="pasta">パスタ</option><option value="udon">うどん</option><option value="soba">そば</option><option value="somen">そうめん</option><option value="none">おかずだけ</option></select></div><div class="notice">使いたい材料と量を入れる。在庫にある食材だけ追加して、味付けが被りすぎない候補を出します。</div><div id="baseRows"></div><button class="b2" onclick="addBaseRow()">使いたい材料を追加</button><button class="b3" onclick="makeMenus()">この材料で候補を出す</button><div id="menuResult" class="small">例：ソーセージ10本、もやし6袋</div></div>
<div class="card"><b>満腹量設定</b><div class="row"><input id="rice2" type="number" value="4" step="0.5"><input id="pasta2" type="number" value="600" step="50"></div><div class="small">左：米2人分の合数 / 右：パスタ2人分のg</div><div class="row"><input id="somen2" type="number" value="6"><input id="udon2" type="number" value="4"></div><button class="b2" onclick="saveSettings()">保存</button></div>
<div class="card"><b>在庫追加</b><div id="foodChips"></div><input id="foodName" placeholder="例：冷凍ブロッコリー、ソーセージ、もやし"><div class="row3"><input id="foodQty" placeholder="数量"><select id="foodUnit"><option>個</option><option>本</option><option>袋</option><option>切れ</option><option>g</option><option>kg</option><option>合</option><option>束</option><option>玉</option><option>缶</option><option>丁</option><option>株</option><option>パック</option></select><input id="foodLimit" type="date"></div><input id="unitGram" placeholder="1単位の重さg 例：もやし1袋200gなら200"><button class="b2" onclick="addFood()">在庫に追加</button><button class="gray" onclick="backupStock()">在庫バックアップをコピー</button><textarea id="restoreText" placeholder="バックアップを貼って復元"></textarea><button class="gray" onclick="restoreBackup()">バックアップから復元</button><div id="stockList"></div></div>
<div class="card"><b>調味料</b><div id="seasoningChips"></div><input id="newSeasoning" placeholder="例：ラー油、コチュジャン、唐辛子"><button class="b2" onclick="addSeasoning()">調味料を追加</button></div>
<div class="card"><b>買い物メモ</b><input id="memoInput" placeholder="例：玉ねぎ"><button class="b2" onclick="addMemo()">追加</button><ul id="memoList"></ul></div></main><script>

const STORE='reizoukoAI_v2';let D=JSON.parse(localStorage.getItem(STORE)||'{}'),stock=D.stock||[],seasons=D.seasons||defaultSeasons.slice(0,23),allSeasons=D.allSeasons||defaultSeasons.slice(),memo=D.memo||[],settings=D.settings||{rice2:4,pasta2:600,somen2:6,udon2:4},baseCount=0,editIndex=null,currentMenus=[];
function $(id){return document.getElementById(id)}function num(v){let x=parseFloat(String(v).replace(/[^\d.]/g,''));return isNaN(x)?0:x}function round(x){return Math.round(x*10)/10}function save(){localStorage.setItem(STORE,JSON.stringify({stock,seasons,allSeasons,memo,settings}))}function hasSeason(x){return seasons.includes(x)}function normalize(n){return String(n||'').replace(/^冷凍/,'')}function stockItem(name){let n=normalize(name);return stock.find(s=>normalize(s.name).includes(n)||n.includes(normalize(s.name)))}function hasStock(name){return !!stockItem(name)}function stockNames(){return stock.map(s=>s.name).filter(Boolean)}function saveSettings(){settings={rice2:+$('rice2').value,pasta2:+$('pasta2').value,somen2:+$('somen2').value,udon2:+$('udon2').value};save();alert('保存しました')}function loadSettings(){$('rice2').value=settings.rice2;$('pasta2').value=settings.pasta2;$('somen2').value=settings.somen2;$('udon2').value=settings.udon2}
function unitOf(f){if(f==='米')return'合';if(f==='パスタ')return'g';if(f==='そうめん')return'束';if(['うどん','そば','焼きそば麺'].includes(f))return'玉';if(['ソーセージ','きゅうり'].includes(f))return'本';if(['もやし','えのき','ほうれん草'].includes(f))return'袋';if(['冷凍ブロッコリー','ブロッコリー'].includes(f))return'g';if(f==='豆腐')return'丁';if(f==='鮭')return'切れ';if(f==='ツナ缶')return'缶';if(f==='納豆')return'パック';return'個'}
function useAmount(f){let n=normalize(f);if(n==='ブロッコリー')return{amount:250,unit:'g'};if(f==='ソーセージ')return{amount:6,unit:'本'};if(f==='卵')return{amount:2,unit:'個'};if(f==='鮭')return{amount:2,unit:'切れ'};if(f==='ツナ缶')return{amount:1,unit:'缶'};if(f==='納豆')return{amount:1,unit:'パック'};if(['鶏肉','豚肉','牛肉','ひき肉'].includes(f))return{amount:250,unit:'g'};if(f==='もやし')return{amount:1,unit:'袋'};if(f==='えのき')return{amount:1,unit:'袋'};if(f==='ピーマン')return{amount:2,unit:'個'};if(f==='玉ねぎ')return{amount:1,unit:'個'};if(f==='じゃがいも')return{amount:2,unit:'個'};return{amount:1,unit:unitOf(f)}}function useObj(f){let a=useAmount(f);return{name:f,amount:a.amount,unit:a.unit}}
function carb(type){let rate=+$('people').value/2;if(type==='rice'&&hasStock('米'))return{name:'米',amount:+$('rice2').value*rate,unit:'合'};if(type==='pasta'&&hasStock('パスタ'))return{name:'パスタ',amount:+$('pasta2').value*rate,unit:'g'};if(type==='udon'&&hasStock('うどん'))return{name:'うどん',amount:+$('udon2').value*rate,unit:'玉'};if(type==='soba'&&hasStock('そば'))return{name:'そば',amount:+$('udon2').value*rate,unit:'玉'};if(type==='somen'&&hasStock('そうめん'))return{name:'そうめん',amount:+$('somen2').value*rate,unit:'束'};if(type==='yakisoba'&&hasStock('焼きそば麺'))return{name:'焼きそば麺',amount:+$('udon2').value*rate,unit:'玉'};return null}function bestCarbs(){let m=$('carbMode').value;if(m==='none')return[null];if(m!=='auto')return[carb(m)].filter(Boolean);let a=[];['rice','pasta','udon','yakisoba','soba','somen'].forEach(t=>{let c=carb(t);if(c)a.push(c)});a.push(null);return a}
function addBaseRow(name='',qty='',unit=''){let id=baseCount++,div=document.createElement('div');div.className='row3';div.style.marginTop='8px';div.id='baseRow'+id;let opts=['個','本','袋','切れ','g','kg','合','束','玉','缶','丁','株','パック'].map(u=>`<option ${u===unit?'selected':''}>${u}</option>`).join('');div.innerHTML=`<input id="bn${id}" placeholder="食材" value="${name}"><input id="bq${id}" placeholder="量" value="${qty}"><select id="bu${id}">${opts}</select><button class="gray" onclick="$('baseRow${id}').remove()">削除</button>`;$('baseRows').appendChild(div)}function baseUses(){let a=[];for(let i=0;i<baseCount;i++){let n=$('bn'+i),q=$('bq'+i),u=$('bu'+i);if(n&&q&&u&&n.value.trim()&&q.value.trim())a.push({name:n.value.trim(),amount:num(q.value),unit:u.value})}return a}

function okStyle(s){return s.need.every(x=>hasSeason(x)||x==='唐辛子'||x.startsWith('あれば'))}function scoreMenu(base,extra,style,carbObj,side){let items=[...base,...extra].map(x=>normalize(x.name)),sc=0;items.forEach(n=>{style.good.map(normalize).includes(n)&&(sc+=35);style.bad.map(normalize).includes(n)&&(sc-=100)});if(carbObj)sc+=60;if(side)sc+=25;if(items.length>=3)sc+=20;if(items.includes('もやし')&&style.name.includes('ナポリタン'))sc-=300;if(items.includes('納豆')&&carbObj&&carbObj.name!=='米')sc-=300;return sc}
function sideOptions(baseNames){let a=[];if(hasStock('もやし')&&!baseNames.includes('もやし')&&['鶏ガラ','ごま油','醤油'].every(hasSeason))a.push({name:'もやしナムル',items:[useObj('もやし')],season:['鶏ガラ 小さじ1','ごま油 小さじ1','醤油 小さじ1'],step:'もやしを加熱して水気を切り、調味料で和える。'});if(hasStock('ツナ缶')&&!baseNames.includes('ツナ缶')&&['マヨネーズ','醤油'].every(hasSeason))a.push({name:'ツナマヨ小鉢',items:[useObj('ツナ缶')],season:['マヨネーズ 大さじ1','醤油 小さじ1'],step:'ツナをマヨ醤油で和える。'});if((hasStock('ブロッコリー')||hasStock('冷凍ブロッコリー'))&&!baseNames.includes('ブロッコリー'))a.push({name:'ブロッコリー小鉢',items:[useObj(hasStock('冷凍ブロッコリー')?'冷凍ブロッコリー':'ブロッコリー')],season:['マヨネーズ 大さじ1','醤油 少し'],step:'ブロッコリーを加熱して和える。'});return a}
function titleFor(style,items,carb,side){let n=items.map(x=>x.name);if(carb&&carb.name==='米')return`${n.join('・')}の${style.name}定食`;if(carb&&carb.name==='パスタ')return`${n.join('・')}の${style.name}パスタ`;if(carb)return`${n.join('・')}の${style.name}${carb.name}`;return`${n.join('・')}の${style.name}`}
function makeMenus(){let base=baseUses();if(!base.length){$('menuResult').innerHTML='使いたい材料を入れてください。';return}let missing=base.filter(x=>!hasStock(x.name));if(missing.length){$('menuResult').innerHTML='在庫にない食材があります：'+missing.map(x=>x.name).join('・');return}let baseNames=base.map(x=>normalize(x.name));let extras=stockNames().filter(x=>!baseNames.includes(normalize(x))&&!['米','パスタ','うどん','そば','そうめん','焼きそば麺'].includes(x)).map(useObj);let extraSets=[[]];extras.forEach(x=>extraSets.push([x]));for(let i=0;i<extras.length;i++)for(let j=i+1;j<extras.length;j++)extraSets.push([extras[i],extras[j]]);let sides=sideOptions(baseNames),carbs=bestCarbs(),out=[];extraSets.forEach(ex=>carbs.forEach(c=>styles.filter(okStyle).forEach(st=>{let type=c?({米:'rice',パスタ:'pasta',うどん:'udon',そば:'soba',そうめん:'somen',焼きそば麺:'yakisoba'}[c.name]||'rice'):'side';if(!st.type.includes(type))return;let sidePick=sides.length&&out.length%4===0?sides[out.length%sides.length]:null,sc=scoreMenu(base,ex,st,c,sidePick);if(sc<35)return;let items=[...base,...ex];out.push({title:titleFor(st,items,c,sidePick)+(sidePick?'＋'+sidePick.name:''),base,extra:ex,carb:c,style:st,side:sidePick,score:sc})})));out.sort((a,b)=>b.score-a.score);let varied=[],used=new Set();for(let m of out){let key=(m.carb?m.carb.name:'おかず')+'_'+m.style.name;if(used.has(key)&&varied.length<8)continue;varied.push(m);used.add(key);if(varied.length>=10)break}currentMenus=varied.length?varied:out.slice(0,10);$('menuResult').innerHTML='<div class="notice">美味しい組み合わせ・満腹量・在庫だけで候補を出しました。</div>'+currentMenus.map(renderMenu).join('')}
function renderMenu(m,i){let mats=[...(m.carb?[m.carb]:[]),...m.base,...m.extra,...(m.side?m.side.items:[])];return`<div class="recipe"><h3>${i+1}. ${m.title}</h3><div><span class="tag">在庫だけ</span><span class="tag">味付け分散</span><span class="tag orange">点数 ${Math.round(m.score)}</span></div><p><b>材料</b></p><ul>${mats.map(x=>`<li>${x.name} ${round(x.amount)}${x.unit}</li>`).join('')}</ul><p><b>調味料</b></p><ul>${m.style.season.map(s=>`<li>${s}</li>`).join('')}${m.side?m.side.season.map(s=>`<li>${m.side.name}：${s}</li>`).join(''):''}</ul><p><b>作り方</b></p><ol>${steps(m).map(s=>`<li>${s}</li>`).join('')}</ol></div>`}
function steps(m){let s=[];if(m.carb&&m.carb.name==='パスタ')s.push(`パスタ${round(m.carb.amount)}${m.carb.unit}を茹でる。`);if(m.carb&&['うどん','そば','そうめん','焼きそば麺'].includes(m.carb.name))s.push(`${m.carb.name}${round(m.carb.amount)}${m.carb.unit}を用意する。`);if(m.carb&&m.carb.name==='米')s.push(`米${round(m.carb.amount)}${m.carb.unit}を用意する。`);s.push([...m.base,...m.extra].map(x=>x.name).join('・')+'を食べやすく切る。');s.push('火が通りにくいものから炒める。');if(m.carb&&m.carb.name!=='米')s.push(`${m.carb.name}を加えて合わせる。`);s.push(m.style.step);if(m.carb&&m.carb.name==='米')s.push('ご飯にのせる、または炒め合わせる。');if(m.side)s.push('追加の1品：'+m.side.step);return s}
function renderFoodChips(){$('foodChips').innerHTML=foodMaster.map(f=>`<button class="chip" onclick="quickFood('${f}')">${f}</button>`).join('')}function quickFood(f){stock.push({name:f,qty:'1',unit:unitOf(f),unitGram:'',limit:$('foodLimit').value});save();renderStock()}function addFood(){let arr=$('foodName').value.trim().replace(/[、，,\s]/g,' ').split(' ').filter(Boolean);arr.forEach(name=>stock.push({name,qty:$('foodQty').value||'1',unit:$('foodUnit').value,unitGram:$('unitGram').value||'',limit:$('foodLimit').value}));$('foodName').value='';$('foodQty').value='';$('unitGram').value='';$('foodLimit').value='';save();renderStock()}function displayStock(s){let extra=s.unitGram?`（1${s.unit}${s.unitGram}g / 合計${round(num(s.qty)*num(s.unitGram))}g）`:'';return`${s.name} / ${s.qty}${s.unit}${extra}`}function renderStock(){if(!stock.length){$('stockList').innerHTML='在庫はまだありません。';return}$('stockList').innerHTML=stock.map((s,i)=>({...s,i})).map(s=>`<div class="item"><div class="top"><div><b>${displayStock(s)}</b></div><div><button class="mini" onclick="editIndex=${s.i};renderStock()">編集</button><button class="mini" onclick="stock.splice(${s.i},1);save();renderStock()">削除</button></div></div>${editIndex===s.i?editHtml(s):''}</div>`).join('')}function editHtml(s){return`<div><input id="en${s.i}" value="${s.name}"><div class="row3"><input id="eq${s.i}" value="${s.qty}"><select id="eu${s.i}">${['個','本','袋','切れ','g','kg','合','束','玉','缶','丁','株','パック'].map(u=>`<option ${u===s.unit?'selected':''}>${u}</option>`).join('')}</select><input id="eg${s.i}" value="${s.unitGram||''}" placeholder="1単位g"></div><button class="b2" onclick="saveEdit(${s.i})">保存</button></div>`}function saveEdit(i){stock[i]={...stock[i],name:$('en'+i).value,qty:$('eq'+i).value,unit:$('eu'+i).value,unitGram:$('eg'+i).value};editIndex=null;save();renderStock()}
function renderSeasons(){$('seasoningChips').innerHTML=allSeasons.map(s=>`<button class="chip ${hasSeason(s)?'on':''}" onclick="toggleSeason('${s}')">${hasSeason(s)?'✓ ':''}${s}</button>`).join('')}function toggleSeason(s){seasons=hasSeason(s)?seasons.filter(x=>x!==s):[...seasons,s];save();renderSeasons()}function addSeasoning(){let arr=$('newSeasoning').value.trim().replace(/[、，,\s]/g,' ').split(' ').filter(Boolean);arr.forEach(s=>{if(!allSeasons.includes(s))allSeasons.push(s);if(!seasons.includes(s))seasons.push(s)});$('newSeasoning').value='';save();renderSeasons()}function addMemo(){let v=$('memoInput').value.trim();if(!v)return;memo.push(v);$('memoInput').value='';save();renderMemo()}function renderMemo(){$('memoList').innerHTML=memo.map((m,i)=>`<li onclick="memo.splice(${i},1);save();renderMemo()">${m}</li>`).join('')}function backupStock(){let txt=JSON.stringify({stock,seasons,memo,settings});navigator.clipboard.writeText(txt).then(()=>alert('バックアップをコピーしました'))}function restoreBackup(){try{let x=JSON.parse($('restoreText').value);stock=x.stock||stock;seasons=x.seasons||seasons;memo=x.memo||memo;settings=x.settings||settings;save();loadSettings();renderStock();renderSeasons();renderMemo();alert('復元しました')}catch(e){alert('復元できません')}}function init(){loadSettings();renderFoodChips();renderStock();renderSeasons();renderMemo();addBaseRow()}init();
</script></body></html>
